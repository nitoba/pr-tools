name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -fsSL https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-2.12.0/git-cliff /usr/local/bin/git-cliff
          chmod +x /usr/local/bin/git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git-cliff --tag "$TAG" > changelog.md
          echo "changelog<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          cat changelog.md >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Package release assets
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIST_DIR="pr-tools-$TAG"
          mkdir -p "$DIST_DIR/bin" "$DIST_DIR/lib"

          cp install.sh "$DIST_DIR/"
          cp src/bin/create-pr-description "$DIST_DIR/bin/"
          cp src/bin/create-test-card "$DIST_DIR/bin/"
          cp src/lib/*.sh "$DIST_DIR/lib/"

          zip -r "$DIST_DIR.zip" "$DIST_DIR"
          echo "DIST_FILE=$DIST_DIR.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ env.DIST_FILE }}
