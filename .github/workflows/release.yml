name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -fsSL https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-2.12.0/git-cliff /usr/local/bin/git-cliff
          chmod +x /usr/local/bin/git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git-cliff --tag "$TAG" > changelog.md
          echo "changelog<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          cat changelog.md >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Package release assets
        run: |
          # Bash CLI assets no longer included in releases
          # All releases now use the Go CLI (prt) via GoReleaser
          echo "DIST_FILE=" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli-go/go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          install-only: true

      - name: Build prt release artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish --config apps/cli-go/.goreleaser.prt.yml

      - name: Collect prt asset list
        run: |
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip dist/prt_*_checksums.txt)
          test ${#assets[@]} -gt 0
          printf 'PRT_ASSETS<<EOF\n' >> "$GITHUB_ENV"
          printf '%s\n' "${assets[@]}" >> "$GITHUB_ENV"
          printf 'EOF\n' >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ env.DIST_FILE }}
            ${{ env.PRT_ASSETS }}
