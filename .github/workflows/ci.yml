name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/cli/**"
  push:
    branches: [main]
    paths:
      - "apps/cli/**"

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck apps/cli/src/bin/create-pr-description
          shellcheck apps/cli/src/bin/create-test-card
          shellcheck apps/cli/install.sh
          for f in apps/cli/src/lib/*.sh; do
            shellcheck "$f"
          done

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Bash syntax
        run: |
          bash -n apps/cli/src/bin/create-pr-description
          bash -n apps/cli/src/bin/create-test-card
          bash -n apps/cli/install.sh
          for f in apps/cli/src/lib/*.sh; do
            bash -n "$f"
          done

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: create-pr-description --help
        run: bash apps/cli/src/bin/create-pr-description --help

      - name: create-pr-description --version
        run: bash apps/cli/src/bin/create-pr-description --version

      - name: create-test-card --help
        run: bash apps/cli/src/bin/create-test-card --help

      - name: create-test-card --version
        run: bash apps/cli/src/bin/create-test-card --version
